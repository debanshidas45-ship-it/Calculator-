<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <div class="calc-header">
            <span class="calc-title">Calculator</span>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>

        <div class="display">
            <div class="display-history" id="displayHistory"></div>
            <div class="display-expression" id="displayExpression">0</div>
            <div class="display-result" id="displayResult"></div>
        </div>

        <button class="history-toggle" id="historyToggle">History</button>
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <span>History</span>
                <button class="history-clear" id="historyClear">Clear</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="buttons">
            <button class="btn func" data-action="clear">C</button>
            <button class="btn func" data-action="toggle-sign">+/−</button>
            <button class="btn func" data-action="percent">%</button>
            <button class="btn operator" data-action="divide">÷</button>

            <button class="btn num" data-action="7">7</button>
            <button class="btn num" data-action="8">8</button>
            <button class="btn num" data-action="9">9</button>
            <button class="btn operator" data-action="multiply">×</button>

            <button class="btn num" data-action="4">4</button>
            <button class="btn num" data-action="5">5</button>
            <button class="btn num" data-action="6">6</button>
            <button class="btn operator" data-action="subtract">−</button>

            <button class="btn num" data-action="1">1</button>
            <button class="btn num" data-action="2">2</button>
            <button class="btn num" data-action="3">3</button>
            <button class="btn operator" data-action="add">+</button>

            <button class="btn num zero" data-action="0">0</button>
            <button class="btn num" data-action="decimal">.</button>
            <button class="btn operator equals" data-action="equals">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
